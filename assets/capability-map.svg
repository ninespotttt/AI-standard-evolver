<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Standard Evolver 功能地图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:32px;font-weight:800;fill:#0f172a}
      .subtitle{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:17px;fill:#475569}
      .hub{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:25px;font-weight:800;fill:#ffffff}
      .hub-sub{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:15px;fill:#dbeafe}
      .section{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:21px;font-weight:800;fill:#0f172a}
      .item{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:15px;fill:#475569}
    </style>
  </defs>
  <rect width="1280" height="720" rx="28" fill="url(#bg)"/>
  <text x="70" y="76" class="title">功能地图</text>
  <text x="70" y="110" class="subtitle">从业务理解到标准沉淀，形成一个可反复使用的分析协议</text>

  <g filter="url(#shadow)">
    <rect x="455" y="242" width="370" height="170" rx="28" fill="url(#hub)"/>
    <text x="516" y="318" class="hub">Standard Evolver</text>
    <text x="525" y="354" class="hub-sub">业务标准进化协议</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="165" width="270" height="180" rx="20" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="96" y="211" class="section">业务理解</text>
    <text x="96" y="250" class="item">业务是什么</text>
    <text x="96" y="280" class="item">用户/客户是谁</text>
    <text x="96" y="310" class="item">AI 要辅助什么判断</text>
  </g>
  <line x1="340" y1="255" x2="455" y2="310" stroke="#60a5fa" stroke-width="3"/>

  <g filter="url(#shadow)">
    <rect x="70" y="400" width="270" height="205" rx="20" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="96" y="446" class="section">标准建立</text>
    <text x="96" y="485" class="item">分析维度</text>
    <text x="96" y="515" class="item">分类标签</text>
    <text x="96" y="545" class="item">证据规则</text>
    <text x="96" y="575" class="item">优先级/评分逻辑</text>
  </g>
  <line x1="340" y1="500" x2="455" y2="350" stroke="#22c55e" stroke-width="3"/>

  <g filter="url(#shadow)">
    <rect x="505" y="500" width="270" height="150" rx="20" fill="#ffffff" stroke="#fed7aa"/>
    <text x="531" y="546" class="section">数据分析</text>
    <text x="531" y="585" class="item">发现是什么</text>
    <text x="531" y="615" class="item">证据在哪里</text>
  </g>
  <line x1="640" y1="500" x2="640" y2="412" stroke="#f97316" stroke-width="3"/>

  <g filter="url(#shadow)">
    <rect x="940" y="165" width="270" height="205" rx="20" fill="#ffffff" stroke="#fbcfe8"/>
    <text x="966" y="211" class="section">标准进化</text>
    <text x="966" y="250" class="item">新增维度</text>
    <text x="966" y="280" class="item">修改标签</text>
    <text x="966" y="310" class="item">调整证据强弱</text>
    <text x="966" y="340" class="item">记录典型案例</text>
  </g>
  <line x1="940" y1="268" x2="825" y2="318" stroke="#ec4899" stroke-width="3"/>

  <g filter="url(#shadow)">
    <rect x="940" y="425" width="270" height="180" rx="20" fill="#ffffff" stroke="#ddd6fe"/>
    <text x="966" y="471" class="section">记忆沉淀</text>
    <text x="966" y="510" class="item">业务规则</text>
    <text x="966" y="540" class="item">判断边界</text>
    <text x="966" y="570" class="item">下一次注意事项</text>
  </g>
  <line x1="940" y1="515" x2="825" y2="370" stroke="#8b5cf6" stroke-width="3"/>
</svg>
