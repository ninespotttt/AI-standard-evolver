<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="600" viewBox="0 0 1280 600" role="img" aria-label="Standard Evolver 解决的问题">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:32px;font-weight:800;fill:#0f172a}
      .subtitle{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:18px;fill:#475569}
      .center{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:26px;font-weight:800;fill:#ffffff}
      .center-sub{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:18px;fill:#cbd5e1}
      .card-title{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:19px;font-weight:800;fill:#0f172a}
      .card-text{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:15px;fill:#475569}
    </style>
  </defs>
  <rect width="1280" height="600" rx="28" fill="url(#bg)"/>
  <text x="70" y="78" class="title">它解决什么问题</text>
  <text x="70" y="112" class="subtitle">很多 AI 分析并不是缺少模型能力，而是缺少稳定、可复用的业务标准</text>

  <g filter="url(#shadow)">
    <rect x="458" y="220" width="364" height="152" rx="24" fill="#0f172a"/>
    <text x="531" y="286" class="center">AI 分析不稳定</text>
    <text x="515" y="326" class="center-sub">缺少标准，结论就容易漂移</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="160" width="300" height="104" rx="18" fill="#ffffff" stroke="#fed7aa"/>
    <text x="96" y="202" class="card-title">数据先行</text>
    <text x="96" y="232" class="card-text">没有先定义什么算好、什么算差</text>
  </g>
  <line x1="370" y1="212" x2="458" y2="270" stroke="#f97316" stroke-width="3"/>

  <g filter="url(#shadow)">
    <rect x="70" y="334" width="300" height="104" rx="18" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="96" y="376" class="card-title">结论漂移</text>
    <text x="96" y="406" class="card-text">同一批数据在不同对话里结论不同</text>
  </g>
  <line x1="370" y1="386" x2="458" y2="320" stroke="#3b82f6" stroke-width="3"/>

  <g filter="url(#shadow)">
    <rect x="490" y="430" width="300" height="104" rx="18" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="516" y="472" class="card-title">经验不沉淀</text>
    <text x="516" y="502" class="card-text">上一轮经验没有影响下一轮判断</text>
  </g>
  <line x1="640" y1="430" x2="640" y2="372" stroke="#22c55e" stroke-width="3"/>

  <g filter="url(#shadow)">
    <rect x="910" y="160" width="300" height="104" rx="18" fill="#ffffff" stroke="#fbcfe8"/>
    <text x="936" y="202" class="card-title">依据不清</text>
    <text x="936" y="232" class="card-text">结论看似合理，但不知道证据在哪</text>
  </g>
  <line x1="910" y1="212" x2="822" y2="270" stroke="#ec4899" stroke-width="3"/>

  <g filter="url(#shadow)">
    <rect x="910" y="334" width="300" height="104" rx="18" fill="#ffffff" stroke="#ddd6fe"/>
    <text x="936" y="376" class="card-title">知识难复用</text>
    <text x="936" y="406" class="card-text">文档有内容，却缺少校准标准的流程</text>
  </g>
  <line x1="910" y1="386" x2="822" y2="320" stroke="#8b5cf6" stroke-width="3"/>
</svg>
