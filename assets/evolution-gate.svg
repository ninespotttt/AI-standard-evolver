<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-label="Standard Evolver 标准进化判断流程">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .title{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:32px;font-weight:800;fill:#0f172a}
      .subtitle{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:17px;fill:#475569}
      .box-title{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:20px;font-weight:800;fill:#0f172a}
      .box-text{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:15px;fill:#475569}
      .decision{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:19px;font-weight:800;fill:#ffffff}
      .label{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:15px;font-weight:700;fill:#334155}
    </style>
  </defs>
  <rect width="1280" height="620" rx="28" fill="url(#bg)"/>
  <text x="70" y="78" class="title">标准怎么进化</text>
  <text x="70" y="112" class="subtitle">只有当数据提供足够证据时，才小步调整业务标准</text>

  <g filter="url(#shadow)">
    <rect x="70" y="230" width="180" height="110" rx="20" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="102" y="278" class="box-title">新数据进入</text>
    <text x="102" y="308" class="box-text">案例、反馈、记录</text>
  </g>
  <line x1="250" y1="285" x2="325" y2="285" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="340" y="230" width="210" height="110" rx="20" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="378" y="278" class="box-title">按标准分析</text>
    <text x="378" y="308" class="box-text">先对齐当前规则</text>
  </g>
  <line x1="550" y1="285" x2="625" y2="285" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <path d="M735 205 L855 285 L735 365 L615 285 Z" fill="#0f172a"/>
    <text x="674" y="280" class="decision">是否挑战</text>
    <text x="682" y="310" class="decision">当前标准？</text>
  </g>

  <line x1="735" y1="365" x2="735" y2="430" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="752" y="404" class="label">没有挑战</text>
  <g filter="url(#shadow)">
    <rect x="620" y="445" width="230" height="92" rx="18" fill="#f0fdf4" stroke="#86efac"/>
    <text x="658" y="487" class="box-title">继续有效</text>
    <text x="658" y="515" class="box-text">沉淀为确认案例</text>
  </g>

  <line x1="855" y1="285" x2="940" y2="285" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="872" y="260" class="label">有挑战</text>
  <g filter="url(#shadow)">
    <rect x="955" y="230" width="230" height="110" rx="20" fill="#ffffff" stroke="#fed7aa"/>
    <text x="996" y="278" class="box-title">定位最小修改点</text>
    <text x="996" y="308" class="box-text">不要重写整套标准</text>
  </g>

  <path d="M1070 340 C1070 410 980 410 980 475" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1008" y="405" class="label">证据不足</text>
  <g filter="url(#shadow)">
    <rect x="875" y="475" width="220" height="92" rx="18" fill="#fff7ed" stroke="#fdba74"/>
    <text x="916" y="517" class="box-title">保留开放问题</text>
    <text x="916" y="545" class="box-text">等待更多数据</text>
  </g>

  <path d="M1185 285 C1235 285 1235 450 1165 500" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1200" y="374" class="label">证据足够</text>
  <g filter="url(#shadow)">
    <rect x="1045" y="475" width="185" height="92" rx="18" fill="#fdf2f8" stroke="#f9a8d4"/>
    <text x="1084" y="517" class="box-title">更新规则</text>
    <text x="1084" y="545" class="box-text">进入下一轮分析</text>
  </g>
</svg>
