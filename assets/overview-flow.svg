<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="430" viewBox="0 0 1280 430" role="img" aria-label="Standard Evolver 核心流程">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef7f1"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .title{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:34px;font-weight:800;fill:#0f172a}
      .subtitle{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:18px;fill:#475569}
      .card-title{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:21px;font-weight:800;fill:#0f172a}
      .card-text{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:15px;fill:#475569}
      .num{font-family:Arial,sans-serif;font-size:18px;font-weight:800;fill:white}
    </style>
  </defs>
  <rect width="1280" height="430" rx="28" fill="url(#bg)"/>
  <rect x="42" y="38" width="1196" height="354" rx="24" fill="#ffffff" stroke="#dbeafe"/>
  <text x="76" y="88" class="title">Standard Evolver 核心流程</text>
  <text x="76" y="122" class="subtitle">先建立业务标准，再让每一次数据分析成为下一次标准进化的证据</text>

  <g transform="translate(76 178)">
    <g filter="url(#shadow)">
      <rect width="190" height="128" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
      <circle cx="34" cy="34" r="17" fill="url(#primary)"/>
      <text x="29" y="40" class="num">1</text>
      <text x="24" y="75" class="card-title">业务说明</text>
      <text x="24" y="102" class="card-text">讲清业务、目标、对象</text>
    </g>
    <line x1="205" y1="64" x2="248" y2="64" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  </g>

  <g transform="translate(324 178)">
    <g filter="url(#shadow)">
      <rect width="190" height="128" rx="18" fill="#f0fdf4" stroke="#bbf7d0"/>
      <circle cx="34" cy="34" r="17" fill="url(#primary)"/>
      <text x="29" y="40" class="num">2</text>
      <text x="24" y="75" class="card-title">建立标准</text>
      <text x="24" y="102" class="card-text">定义维度、标签、证据</text>
    </g>
    <line x1="205" y1="64" x2="248" y2="64" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  </g>

  <g transform="translate(572 178)">
    <g filter="url(#shadow)">
      <rect width="190" height="128" rx="18" fill="#fff7ed" stroke="#fed7aa"/>
      <circle cx="34" cy="34" r="17" fill="url(#primary)"/>
      <text x="29" y="40" class="num">3</text>
      <text x="24" y="75" class="card-title">分析数据</text>
      <text x="24" y="102" class="card-text">按标准分析案例和反馈</text>
    </g>
    <line x1="205" y1="64" x2="248" y2="64" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  </g>

  <g transform="translate(820 178)">
    <g filter="url(#shadow)">
      <rect width="190" height="128" rx="18" fill="#fdf2f8" stroke="#fbcfe8"/>
      <circle cx="34" cy="34" r="17" fill="url(#primary)"/>
      <text x="29" y="40" class="num">4</text>
      <text x="24" y="75" class="card-title">调整标准</text>
      <text x="24" y="102" class="card-text">只改被证据支持的部分</text>
    </g>
    <line x1="205" y1="64" x2="248" y2="64" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  </g>

  <g transform="translate(1068 178)">
    <g filter="url(#shadow)">
      <rect width="150" height="128" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
      <circle cx="34" cy="34" r="17" fill="url(#primary)"/>
      <text x="29" y="40" class="num">5</text>
      <text x="24" y="75" class="card-title">沉淀记忆</text>
      <text x="24" y="102" class="card-text">规则、案例、边界</text>
    </g>
  </g>

  <path d="M1140 324 C1040 382 460 382 380 324" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <text x="586" y="365" class="subtitle">沉淀后的标准，成为下一轮分析的起点</text>
</svg>
