<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="Standard Evolver 输出结构">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .title{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:30px;font-weight:800;fill:#0f172a}
      .subtitle{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:16px;fill:#475569}
      .box-title{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:18px;font-weight:800;fill:#0f172a}
      .box-text{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:14px;fill:#64748b}
      .dark-title{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:18px;font-weight:800;fill:#ffffff}
      .dark-text{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:14px;fill:#cbd5e1}
    </style>
  </defs>
  <rect width="1280" height="320" rx="28" fill="url(#bg)"/>
  <text x="70" y="70" class="title">输出结构</text>
  <text x="70" y="102" class="subtitle">一次完整输出从业务背景开始，以可复用记忆结束</text>

  <g transform="translate(70 150)" filter="url(#shadow)">
    <rect width="190" height="92" rx="18" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="24" y="38" class="box-title">Business Context</text>
    <text x="24" y="66" class="box-text">业务背景</text>
  </g>
  <line x1="275" y1="196" x2="325" y2="196" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(340 150)" filter="url(#shadow)">
    <rect width="190" height="92" rx="18" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="24" y="38" class="box-title">Business Standard</text>
    <text x="24" y="66" class="box-text">当前业务标准</text>
  </g>
  <line x1="545" y1="196" x2="595" y2="196" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(610 150)" filter="url(#shadow)">
    <rect width="190" height="92" rx="18" fill="#ffffff" stroke="#fed7aa"/>
    <text x="24" y="38" class="box-title">Data Analysis</text>
    <text x="24" y="66" class="box-text">基于标准的数据分析</text>
  </g>
  <line x1="815" y1="196" x2="865" y2="196" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(880 150)" filter="url(#shadow)">
    <rect width="190" height="92" rx="18" fill="#ffffff" stroke="#fbcfe8"/>
    <text x="24" y="38" class="box-title">Standard Update</text>
    <text x="24" y="66" class="box-text">标准更新记录</text>
  </g>
  <line x1="1085" y1="196" x2="1135" y2="196" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(1140 150)" filter="url(#shadow)">
    <rect width="110" height="92" rx="18" fill="#0f172a"/>
    <text x="16" y="38" class="dark-title">Memory</text>
    <text x="16" y="66" class="dark-text">记忆沉淀</text>
  </g>
</svg>
